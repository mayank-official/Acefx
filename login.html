<script>
    function handleLogin(e) {
        e.preventDefault();
        window.location.href = 'index.html';
    }

    const passwordInput = document.getElementById('password');
    const eyeButton = document.querySelector('button[type="button"]');
    
    // Toggle password visibility
    eyeButton.addEventListener('click', (e) => {
        e.preventDefault();
        const isPassword = passwordInput.type === 'password';
        passwordInput.type = isPassword ? 'text' : 'password';
        eyeButton.querySelector('.material-symbols-outlined').textContent = isPassword ? 'visibility' : 'visibility_off';
    });
    
    // Google Identity Services implementation
    window.onload = function () {
        if (typeof google !== 'undefined') {
            const client = google.accounts.oauth2.initTokenClient({
                client_id: 'YOUR_GOOGLE_CLIENT_ID_HERE', // <-- Replace with your real Google Client ID
                scope: 'https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email',
                callback: (response) => {
                    console.log("Google Token Response: ", response);
                    alert("Successfully authenticated with Google!\n\nAccess Token: " + response.access_token.substring(0, 20) + "...");
                    // Redirect or handle login here
                },
            });
            
            document.getElementById('google-btn-login').addEventListener('click', (e) => {
                e.preventDefault();
                client.requestAccessToken();
            });
        }
    };
</script>
