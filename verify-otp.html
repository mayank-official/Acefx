<script>
    document.addEventListener("DOMContentLoaded", function() {
        const otpInputs = document.querySelectorAll('.otp-input');
        const form = document.getElementById('otp-form');
        const resendBtn = document.getElementById('resend-btn');
        const timerSpan = document.getElementById('timer');
        
        // Auto-focus and backspace logic for OTP inputs
        otpInputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                // Ensure only numbers are entered
                e.target.value = e.target.value.replace(/[^0-9]/g, '');
                
                // Move to next input if current is filled
                if (e.target.value !== '') {
                    if (index < otpInputs.length - 1) {
                        otpInputs[index + 1].focus();
                    }
                }
            });

            input.addEventListener('keydown', (e) => {
                // Move to previous input on Backspace if current is empty
                if (e.key === 'Backspace' && e.target.value === '') {
                    if (index > 0) {
                        otpInputs[index - 1].focus();
                    }
                }
            });
            
            // Allow pasting full 6 digit code
            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const pastedData = e.clipboardData.getData('text').replace(/[^0-9]/g, '').slice(0, 6);
                if (pastedData) {
                    for (let i = 0; i < pastedData.length; i++) {
                        if (otpInputs[i]) {
                            otpInputs[i].value = pastedData[i];
                            if (i < otpInputs.length - 1) {
                                otpInputs[i+1].focus();
                            } else {
                                otpInputs[i].focus();
                            }
                        }
                    }
                }
            });
        });

        // Mock verification submit
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            let otp = '';
            otpInputs.forEach(input => otp += input.value);
            
            if (otp.length === 6) {
                // Redirect to home page after successful OTP verification
                window.location.href = 'index.html';
            } else {
                alert('Please enter a valid 6-digit OTP.');
            }
        });

        // Simple timer logic for Resend button
        let timeLeft = 30;
        let timerId = setInterval(() => {
            timeLeft--;
            if (timeLeft <= 0) {
                clearInterval(timerId);
                resendBtn.disabled = false;
                resendBtn.innerHTML = "Resend OTP";
            } else {
                timerSpan.textContent = timeLeft;
            }
        }, 1000);
        
        resendBtn.addEventListener('click', () => {
            alert('A new OTP has been sent!');
            // Reset timer
            resendBtn.disabled = true;
            timeLeft = 30;
            resendBtn.innerHTML = 'Resend in <span id="timer">30</span>s';
            timerId = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    resendBtn.disabled = false;
                    resendBtn.innerHTML = "Resend OTP";
                } else {
                    document.getElementById('timer').textContent = timeLeft;
                }
            }, 1000);
        });
    });
</script>
